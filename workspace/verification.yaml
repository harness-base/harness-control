# 被管工程验证路由：每个工程怎么验证写在这。
# 控制面不放业务测试本体；详见 docs/harness/VERIFICATION_ROUTING.md。
#
# 接入点占位「三态」（ADR-0017，scripts/verification-audit.sh 机检）：每个接入点值必须是——
#   · 真命令（已接实）
#   · "PENDING: <为啥现在空 / 补的条件>"（待接实：make verify ⚠ 提醒；同时项目 AGENTS.md 留待补记录）
#   · "N/A: <理由>"（这项目不需要这个接入点）
#   静默空 / 无理由 / 裸 TODO / <占位> = ✗ 红。
# sandbox 按契约拆三字段：sandbox（起）/ sandbox_down（停）/ sandbox_status（查，exit 0=就绪）
#   （+可选 sandbox_reset / sandbox_seed）；接实走 hc-onboard / hc-create-sandbox skill，契约见 docs/harness/SANDBOX_CONTRACT.md。
# routelist：导出实现侧接口清单的命令（输出一行一个接口），契约对照场景消费（ADR-0026）；onboard 接执行口时建。
version: 1
projects:
  - name: kratos-base
    path: projects/kratos-base
    verify: "make -C projects/kratos-base verify"          # 最小收口检查：build+vet+lint+test
    unit:   "go -C projects/kratos-base test ./... -race"  # 带 -race 的单元测试
    e2e:    "bash projects/kratos-base/test/resilience/run_all.sh"  # AC1-AC6 + AC-R1~R3 + AC-C2(etcd conf) + AC-D(etcd disc) + AC-M1~M3(MQ boot/recover/drop) + AC-N1~N2(nacos conf+disc) + AC-CR1~CR2(配置/注册中心运行期宕×{etcd,nacos}) 20项弹性场景
    # S5-T2: 配置/注册中心运行期宕场景新增：
    #   AC-CR1(etcd/nacos): 配置中心运行期宕→进程不崩→恢复后热更续上
    #   AC-CR2(etcd/nacos): 注册中心运行期宕→discovery失败→恢复后自动重注册+discovery续上
    sandbox: "make -C projects/kratos-base sandbox-up"        # 起（E2E 所需环境；契约见 docs/harness/SANDBOX_CONTRACT.md）
    sandbox_down: "make -C projects/kratos-base sandbox-down"  # 停
    sandbox_status: "PENDING: 按 SANDBOX_CONTRACT 补 status 入口（走 hc-create-sandbox，ADR-0019 follow-up）"
    routelist: "PENDING: 待写 proto 解析脚本导出接口清单（走 hc-onboard 老项目第4步接执行口补或专项直落；契约对照场景用，ADR-0026）"  # 导出实现侧接口清单（一行一个接口）

# 示例（新项目接入后，hc-onboard 按「三态」填；真内容后补，见 ADR-0017 / 0019）：
# projects:
#   - name: backend-service
#     path: projects/backend-service
#     verify:  "make -C projects/backend-service verify"      # 已接实：真命令
#     unit:    "make -C projects/backend-service test"        # 已接实
#     api:     "N/A: 无对外 api 层"                            # 显式不需要
#     e2e:     "PENDING: 首个需求上线后补"                     # 待接实（make verify ⚠ 提醒）
#     sandbox:        "PENDING: 要跑 e2e 时走 hc-create-sandbox 接实"   # 起（三字段见 SANDBOX_CONTRACT.md）
#     sandbox_down:   "PENDING: 同上，随 sandbox 一起接"                # 停
#     sandbox_status: "PENDING: 同上，随 sandbox 一起接"                # 查（exit 0=就绪）
#     routelist:      "PENDING: 首个接口落地后补导出脚本"                # 导出接口清单（契约对照用）
